<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HEISENBF6 — Battlefield 6 Content</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080c;
    --surface: rgba(255, 106, 0, 0.06);
    --accent: #FF6A00;
    --accent-glow: #FF4500;
    --text: #f0f0f0;
    --text-muted: #888;
    --link-bg: rgba(255, 255, 255, 0.04);
    --link-border: rgba(255, 106, 0, 0.15);
    --link-hover-bg: rgba(255, 106, 0, 0.12);
    --link-hover-border: rgba(255, 106, 0, 0.6);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  html { height: 100%; }

  body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 50% 20%, rgba(255, 69, 0, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 80%, rgba(255, 106, 0, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 48px 24px 64px;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Avatar */
  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-glow), var(--accent), var(--accent-glow), var(--accent));
    animation: ring-rotate 4s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes ring-rotate {
    to { background: conic-gradient(from 360deg, var(--accent), var(--accent-glow), var(--accent), var(--accent-glow), var(--accent)); }
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    background: var(--bg);
    border: 2px solid var(--bg);
  }

  /* Username */
  .username {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    text-shadow: 0 0 30px rgba(255, 106, 0, 0.4), 0 0 60px rgba(255, 69, 0, 0.15);
    animation: text-glow 3s ease-in-out infinite alternate;
    margin-bottom: 4px;
  }

  @keyframes text-glow {
    from { text-shadow: 0 0 20px rgba(255, 106, 0, 0.3), 0 0 40px rgba(255, 69, 0, 0.1); }
    to { text-shadow: 0 0 30px rgba(255, 106, 0, 0.5), 0 0 80px rgba(255, 69, 0, 0.2); }
  }

  /* Tagline */
  .tagline {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    opacity: 0.9;
  }

  /* Bio */
  .bio {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
    max-width: 300px;
    margin-bottom: 36px;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: var(--link-bg);
    border: 1px solid var(--link-border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    font-weight: 500;
    font-size: 0.95rem;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }

  .link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 106, 0, 0.1), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .link:hover, .link:focus-visible {
    background: var(--link-hover-bg);
    border-color: var(--link-hover-border);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(255, 106, 0, 0.12), 0 0 0 1px rgba(255, 106, 0, 0.1);
  }

  .link:hover::before, .link:focus-visible::before { opacity: 1; }

  .link:active { transform: translateY(0); }

  .link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .link-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    opacity: 0.9;
  }

  .link-text {
    position: relative;
    z-index: 1;
    flex: 1;
  }

  .link-arrow {
    opacity: 0;
    transform: translateX(-6px);
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
    color: var(--accent);
    font-size: 0.85rem;
  }

  .link:hover .link-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Status indicator */
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
  }

  /* HUD decorative corners */
  .hud-corner {
    position: fixed;
    width: 40px;
    height: 40px;
    border-color: rgba(255, 106, 0, 0.15);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
    z-index: 3;
  }

  .hud-tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; }
  .hud-tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; }
  .hud-bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; }
  .hud-br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; }

  /* Entry animation */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fade-up 0.6s ease-out both;
  }

  .animate-in:nth-child(1) { animation-delay: 0.1s; }
  .animate-in:nth-child(2) { animation-delay: 0.2s; }
  .animate-in:nth-child(3) { animation-delay: 0.25s; }
  .animate-in:nth-child(4) { animation-delay: 0.3s; }
  .animate-in:nth-child(5) { animation-delay: 0.4s; }
  .animate-in:nth-child(6) { animation-delay: 0.5s; }
  .animate-in:nth-child(7) { animation-delay: 0.6s; }
  .animate-in:nth-child(8) { animation-delay: 0.7s; }
</style>
